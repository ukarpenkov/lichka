<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Будильник</title>
    <style>
        @import url('https://cdn.fontsource.org/fonts/inter/css.css');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            padding: 28px 24px;
            position: relative;
            overflow: hidden;
        }

        /* ===== Верхняя панель ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0 8px;
        }

        .top-bar-label {
            font-size: 13px;
            font-weight: 500;
            color: #666666;
            letter-spacing: 0.02em;
        }

        .status-time {
            font-size: 13px;
            font-weight: 500;
            color: #666666;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
        }

        /* ===== Основной контент ===== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
        }

        /* ===== Иконка будильника ===== */
        .alarm-icon-wrapper {
            position: relative;
            width: 128px;
            height: 128px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .alarm-icon-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 1px solid #1e1e1e;
            background: #0f0f0f;
        }

        .alarm-icon-pulse {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.04);
            animation: pulse-ring 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .alarm-icon-pulse:nth-child(2) {
            animation-delay: 0.8s;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            100% {
                transform: scale(1.5);
                opacity: 0;
            }
        }

        .alarm-icon {
            position: relative;
            z-index: 2;
            width: 56px;
            height: 56px;
            color: #ffffff;
            animation: alarm-shake 0.6s ease-in-out infinite;
        }

        @keyframes alarm-shake {

            0%,
            100% {
                transform: rotate(0deg);
            }

            10%,
            30%,
            50%,
            70%,
            90% {
                transform: rotate(-3deg);
            }

            20%,
            40%,
            60%,
            80% {
                transform: rotate(3deg);
            }
        }

        .alarm-icon svg {
            width: 100%;
            height: 100%;
        }

        /* ===== Время и название ===== */
        .alarm-info {
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .alarm-time {
            font-size: 64px;
            font-weight: 200;
            letter-spacing: -0.03em;
            color: #ffffff;
            font-variant-numeric: tabular-nums;
            line-height: 1;
        }

        .alarm-label {
            font-size: 20px;
            font-weight: 500;
            letter-spacing: -0.01em;
            color: #888888;
            line-height: 1.2;
        }

        /* ===== Текстовые действия ===== */
        .actions {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            padding: 0 4px 20px;
        }

        .text-action {
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit;
            padding: 10px 18px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 100px;
        }

        .text-action:active {
            transform: scale(0.96);
        }

        .text-action .action-icon {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .text-action:hover .action-icon {
            transform: scale(1.1);
        }

        .text-action .action-label {
            font-size: 17px;
            font-weight: 500;
            letter-spacing: 0.01em;
            line-height: 1;
        }

        /* Отключить — красноватый */
        .action-dismiss {
            color: #ff5c5c;
        }

        .action-dismiss:hover {
            color: #ff7a7a;
        }

        .action-dismiss:active {
            color: #e04a4a;
        }

        /* Отложить — приглушённый белый */
        .action-snooze {
            color: #555555;
        }

        .action-snooze:hover {
            color: #999999;
        }

        .action-snooze:active {
            color: #333333;
        }

        .action-divider {
            width: 32px;
            height: 1px;
            background: #1e1e1e;
        }

        /* ===== Home indicator ===== */
        .home-indicator {
            width: 120px;
            height: 4px;
            background: #333333;
            border-radius: 100px;
            margin: 0 auto 8px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            top: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1a1a1a;
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid #2a2a2a;
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 100;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ===== Адаптивность ===== */
        @media (max-height: 640px) {
            .alarm-icon-wrapper {
                width: 100px;
                height: 100px;
            }

            .alarm-icon {
                width: 44px;
                height: 44px;
            }

            .alarm-time {
                font-size: 52px;
            }

            .alarm-label {
                font-size: 18px;
            }

            .actions {
                gap: 18px;
            }
        }

        @media (min-width: 480px) {
            .app-container {
                height: 100vh;
                border-radius: 32px;
                margin: 20px auto;
                max-height: 820px;
                box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8);
                border: 1px solid #1a1a1a;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">

        <div class="top-bar">
            <div class="top-bar-label">Будильник</div>
            <div class="status-time" id="statusTime">19:06</div>
        </div>

        <div class="main-content">

            <div class="alarm-icon-wrapper">
                <div class="alarm-icon-pulse"></div>
                <div class="alarm-icon-pulse"></div>
                <div class="alarm-icon-ring"></div>
                <div class="alarm-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="13" r="8" />
                        <path d="M12 9v4l2.5 1.5" />
                        <path d="M5 3L2 6" />
                        <path d="M22 6l-3-3" />
                        <path d="M6.38 18.7L4 21" />
                        <path d="M17.64 18.67L20 21" />
                    </svg>
                </div>
            </div>

            <div class="alarm-info">
                <div class="alarm-time">19:04</div>
                <div class="alarm-label">Аааапп</div>
            </div>

        </div>

        <div class="actions">
            <button class="text-action action-dismiss" id="dismissBtn">
                <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 6L6 18" />
                    <path d="M6 6l12 12" />
                </svg>
                <span class="action-label">Отключить</span>
            </button>

            <div class="action-divider"></div>

            <button class="text-action action-snooze" id="snoozeBtn">
                <svg class="action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                <span class="action-label">Отложить · 5 мин</span>
            </button>
        </div>

        <div class="home-indicator"></div>

    </div>

    <div class="toast" id="toast"></div>

    <script>
        function updateTime() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('statusTime').textContent = `${h}:${m}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        document.getElementById('dismissBtn').addEventListener('click', () => {
            showToast('Будильник отключён');
        });

        document.getElementById('snoozeBtn').addEventListener('click', () => {
            showToast('Будильник отложен на 5 минут');
        });
    </script>

</body>

</html>
